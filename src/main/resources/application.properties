# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=deadline-analyzer

# Logging
logging.level.root=INFO
logging.level.com.deadline.analyzer=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Firebase Configuration
firebase.database.url=${FIREBASE_DATABASE_URL:}
firebase.credentials.path=serviceAccountKey.json

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:your-secret-key-change-in-production-min-32-chars}
jwt.expiration.ms=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Server Servlet
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# DO NOT PUT API KEYS HERE
firebase.api.key=${FIREBASE_API_KEY}