# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=deadline-analyzer

# Logging
logging.level.root=INFO
logging.level.com.deadline.analyzer=DEBUG

# Firebase Configuration (from environment variables)
firebase.database.url=${FIREBASE_DATABASE_URL:}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:serviceAccountKey.json}
firebase.api.key=${FIREBASE_API_KEY:}

# JWT Configuration (from environment variables)
jwt.secret.key=${JWT_SECRET_KEY:your-secret-key-min-32-chars-change-in-production}
jwt.expiration.ms=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Server Servlet
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true