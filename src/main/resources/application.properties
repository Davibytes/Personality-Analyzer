server.port=8080
spring.application.name=deadline-analyzer
logging.level.root=INFO
logging.level.com.deadline.analyzer=DEBUG
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
server.servlet.session.tracking-modes=cookie
spring.web.resources.cache.cachecontrol.max-age=0

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/Deadline-analyzer
spring.data.mongodb.auto-index-creation=true

# reCAPTCHA Configuration (use test key for development)
recaptcha.secret.key=6LeIxAcTAAAAAGc-Vm5RsZcZjuyb7y4tI7EWD

# Logging Configuration
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n