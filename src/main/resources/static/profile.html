<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Deadline Analyzer</title>
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="logo">Deadline Analyzer</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="tasks.html">Tasks</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </div>
</nav>

<main>
    <div class="container">
        <div class="welcome-section">
            <h1>Your Profile</h1>
            <p class="welcome-subtitle">Manage your account information</p>
        </div>

        <div class="cards-row">
            <div class="card">
                <h2>Account Information</h2>
                <div class="profile-item">
                    <label>Full Name</label>
                    <p id="profileName">-</p>
                </div>
                <div class="profile-item">
                    <label>Email Address</label>
                    <p id="profileEmail">-</p>
                </div>
                <div class="profile-item">
                    <label>Member Since</label>
                    <p id="memberSince">-</p>
                </div>
            </div>

            <div class="card">
                <h2>Personality Profile</h2>
                <div class="profile-item">
                    <label>Personality Type</label>
                    <p id="profilePersonality">Not yet determined</p>
                </div>
                <div class="profile-item">
                    <label>Average DUP Score</label>
                    <p id="profileDup">-</p>
                </div>
                <div class="profile-item">
                    <label>Task Completion Rate</label>
                    <p id="profileCompletion">-</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Account Actions</h2>
            <div class="action-buttons">
                <button id="changePasswordBtn" class="btn btn-secondary">Change Password</button>
                <button id="deleteAccountBtn" class="btn btn-secondary" style="background-color: #E57373; color: white; border: none;">Delete Account</button>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Deadline Personality Analyzer. All rights reserved.</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const userId = localStorage.getItem('userId');
        const fullName = localStorage.getItem('fullName');
        const email = localStorage.getItem('email');
        const personalityType = localStorage.getItem('personalityType');

        if (!userId) {
            window.location.href = 'login.html';
            return;
        }

        // Display profile info
        document.getElementById('profileName').textContent = fullName || '-';
        document.getElementById('profileEmail').textContent = email || '-';
        document.getElementById('profilePersonality').textContent = personalityType || 'Not yet determined';
        document.getElementById('memberSince').textContent = new Date().toLocaleDateString();
        document.getElementById('profileDup').textContent = '-';
        document.getElementById('profileCompletion').textContent = '-';

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'index.html';
        });

        // Change password
        document.getElementById('changePasswordBtn').addEventListener('click', () => {
            alert('Password change feature coming soon');
        });

        // Delete account
        document.getElementById('deleteAccountBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to delete your account? This cannot be undone.')) {
                alert('Account deletion feature coming soon');
            }
        });
    });
</script>
</body>
</html>
