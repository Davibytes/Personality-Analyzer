<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Deadline Analyzer</title>
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <div class="logo">Deadline Analyzer</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="tasks.html">Tasks</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </div>
</nav>

<main>
    <div class="container">
        <div class="welcome-section">
            <h1>My Tasks</h1>
            <p class="welcome-subtitle">Track and manage your academic deadlines</p>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Your Tasks</h2>
                <button class="btn btn-primary">+ New Task</button>
            </div>
        </div>

        <div class="card">
            <p style="text-align: center; padding: 40px 0;">No tasks yet. Click the "New Task" button to create your first task and start tracking your deadline habits.</p>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Deadline Personality Analyzer. All rights reserved.</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const userId = localStorage.getItem('userId');

        if (!userId) {
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'index.html';
        });
    });
</script>
</body>
</html>
